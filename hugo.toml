baseURL = 'https://muhammad.el-hindi.de'
languageCode = 'en-us'
title = "Muhammad El-Hindi"
copyright = "Muhammad El-Hindi"
enableRobotsTXT = true
disableKinds = ["taxonomy", "term"]

[params]
  description = "Personal academic website of Muhammad El-Hindi, post-doctoral researcher at Technische Universität München working on secure cloud data systems."
  title = "Muhammad El-Hindi"
  dateFormat = "2006-01-02"
  madeWith = "Made with [Hugo](https://gohugo.io/) and [Bear Cub](https://github.com/clente/hugo-bearcub)."
  [params.home]
    portrait = "/images/melhindi.jpg"
    role = "Post-Doctoral Researcher at Technische Universität München"
    intro = "My research focuses on secure, cloud-native data systems, with an emphasis on designing high-performance, cost-efficient services. I am broadly interested in robust distributed system design, including techniques such as formal verification, deterministic simulation testing, and performance benchmarking."
    [[params.home.links]]
      name = "Email"
      url = "mailto:muhammad.el-hindi@tum.de"
      icon = "email"
    [[params.home.links]]
      name = "Google Scholar"
      url = "https://scholar.google.com/citations?user=0U6OV0AAAAAJ"
      icon = "scholar"
    [[params.home.links]]
      name = "GitHub"
      url = "https://github.com/melhindi"
      icon = "github"
  [params.author]
    name = "Muhammad El-Hindi"

[menus]
  [[menus.main]]
    name = "Publications"
    pageRef = "/publications"
    weight = 10
  [[menus.main]]
    name = "Blog"
    pageRef = "/posts"
    weight = 20

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true # default is false
    [markup.goldmark.renderHooks]
      [markup.goldmark.renderHooks.image]
        useEmbedded = 'fallback'
        errorLevel = 'warning' # ignore (default), warning, or error (fails the build)

[module]
  [[module.imports]]
    path = "github.com/clente/hugo-bearcub"

[build]
  writeStats = true

[caches]
  [caches.images]
    dir = ':cacheDir/images'
